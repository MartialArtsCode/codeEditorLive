<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Code Editor</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: sans-serif; 
            text-align: center; 
            margin: 0; 
            height: 100vh; 
            display: flex;
            flex-direction: column; /* Arrange elements in a column */
        }
        h1 { 
            color: purple; 
        }
        #editor {
            width: 50%; 
            height: 100%; /* Fill half the screen */
            border: none; 
            padding: 10px; 
            font-family: monospace; 
            font-size: 14px; 
            outline: none; 
            resize: none; 
        }
        #preview {
            width: 100%; 
            height: 50%; /* Fill the other half */
            border: none; 
            background: #fff; 
        }
    </style>
</head>
<body>
    <textarea id="editor">
<!DOCTYPE html>
<html>
<head>
    <title>Your Embedded Code</title>
</head>
<body>
    <h1>Hello World!</h1>
    <p>Edit the code on the left and see results here.</p>
</body>
</html>
    </textarea>

    <iframe id="preview"></iframe>

    <script src="script.js"></script>
</body>
</html>
