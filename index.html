<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Browser IDE</title>

  <!-- Dependencies -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.33.1/cytoscape.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.55.1/min/vs/loader.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/vs2015.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.55.1/min/vs/editor/editor.main.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <div class="title">&#60;/&#62; Live Code Editor</div>
    <nav class="nav">
      <label for="mode-select">Mode:</label>
      <select id="mode-select" aria-label="Project Mode">
        <option value="monolithic">Monolithic</option>
        <option value="modular">Modular</option>
        <option value="fullstack">Fullstack</option>
      </select>
    </nav>
    <nav class="nav">
      <label for="file-select">Actions:</label>
      <select id="file-select" aria-label="File Actions">
        <option value="" disabled selected>Select Action</option>
        <option value="new-file">+ New File</option>
        <option value="save-files">Save</option>
        <option value="export-zip">Export ZIP</option>
        <option value="refresh-graph">Refresh Graph</option>
        <option value="mock-api">Mock API</option>
        <option value="theme-toggle">Toggle Theme</option>
        <option value="load-users">Load Users</option>
        <option value="clear-all">Clear All</option>
      </select>
    </nav>
  </header>

  <main class="layout">
    <aside class="file-nav">
      <h3>Files</h3>
      <ul id="file-list"></ul>
    </aside>

    <section class="editor-section">
      <div id="editor-container"></div>
      <textarea id="fallback-textarea" spellcheck="false" placeholder="Write your code here"></textarea>
    </section>

    <aside class="preview-section">
      <h3>Live Preview</h3>
      <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin allow-modals"></iframe>
      <div id="preview-errors" class="error-box"></div>
    </aside>
  </main>

  <section class="graph-section">
    <h3>Dependency Graph (Cytoscape)</h3>
    <div id="dependency-graph"></div>
  </section>

  <!-- Mock API Modal -->
  <dialog id="mock-modal">
    <h3>Mock API Routes</h3>
    <div id="routes-list"></div>
    <form id="new-route-form">
      <label for="route-method">Choose method:</label>
      <select id="route-method">
        <option>GET</option>
        <option>POST</option>
      </select>
      <label for="route-path">API Route:</label>
      <input type="text" id="route-path" placeholder="/api/users" required>
      <label for="route-response">Response:</label>
      <textarea id="route-response" placeholder='{"id":1,"name":"Test"}' required></textarea>
      <button type="button" id="add-route-btn">➕ Add Route</button>
    </form>
    <button id="close-modal">❌ Close</button>
  </dialog>

  <script src="js/modes.js"></script>
  <script src="js/files.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/mockApi.js"></script>
  <script src="js/export.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/preview.js"></script>
  <script src="js/graph.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
