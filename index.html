<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">   
  <title>Web IDE</title>
    
    <style>
      body{
        margin:0;
        display:grid;
        grid-template-columns:250px 1fr 1fr;
        height:100vh;
        font-family:sans-serif;
      }
      
      #navigator{
        background:#111;
        color:white;
        padding:10px;
      }
      
      #editor{
        tab-size: 4;
        white-space: pre;
        width:100%;
        height:100%;
        border:none;
        font-family:monospace;
      }

      #preview{
        width:100%;
        height:100%;
        border:none;
      }
    </style>
  </head>
  
  <body>
    
    <div id="navigator"></div>
    
    <textarea id="editor"></textarea>
    
    <iframe id="preview"></iframe>

    <script type="module">

      import "./core/projectManager.js"
      import "./core/modeController.js"
      import "./ui/editorPanel.js"
      import "./ui/fileNavigator.js"
      import "./core/renderer.js"
      import "./visualization/dependencyGraph.js"
      import "./backend/mockServer.js"
    
    </script>
  
  </body>
</html>
